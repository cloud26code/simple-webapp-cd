<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Minimal Jewelry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400&display=swap');

        body {
            font-family: 'Raleway', sans-serif;
            background-color: #ffffff;
            margin: 0;
            color: #333;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background-color: #fafafa;
            border-bottom: 1px solid #eee;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 4px;
            color: #1a1a1a;
        }

        header p {
            font-style: italic;
            color: #888;
            margin-top: 10px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .product-card {
            text-align: center;
            transition: opacity 0.3s ease;
        }

        .product-card:hover {
            opacity: 0.8;
        }

        .image-wrapper {
            background-color: #f9f9f9;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .product-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
        }

        .product-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin: 15px 0 5px;
            font-weight: 400;
        }

        .product-card p {
            font-weight: 400;
            color: #555;
            margin-bottom: 15px;
        }

        .btn-view {
            text-decoration: none;
            color: #000;
            border-bottom: 1px solid #000;
            padding-bottom: 2px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-view:hover {
            color: #d4af37; /* Gold color */
            border-bottom-color: #d4af37;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #bbb;
        }
    </style>
</head>
<body>

    <header>
        <h1>AURA JEWELRY</h1>
        <p>Minimalist Design • Modest Elegance</p>
    </header>

    <div class="container">
        {% for item in collection %}
        <div class="product-card">
            <div class="image-wrapper">
                <img src="{{ item.image }}" alt="{{ item.name }}">
            </div>
            <h3>{{ item.name }}</h3>
            <p>{{ item.price }}</p>
            <a href="#" class="btn-view">View Details</a>
        </div>
        {% endfor %}
    </div>

    <footer>
        &copy; 2026 Aura Minimalist Jewelry. All Rights Reserved.
    </footer>

</body>
</html>
