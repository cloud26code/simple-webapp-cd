<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book Collection</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .book-card { 
            background: white; margin: 15px; padding: 15px; 
            border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 200px; 
        }
        .book-card img { width: 100%; border-radius: 4px; height: 280px; object-fit: cover; }
        h3 { font-size: 1.1em; margin: 10px 0 5px; }
        p { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>📚 My Personal Library</h1>

    <div class="container">
        {% for book in books %}
        <div class="book-card">
            <img src="https://covers.openlibrary.org/b/isbn/{{ book.isbn }}-M.jpg" 
                 alt="{{ book.title }}" 
                 onerror="this.src='https://via.placeholder.com/200x280?text=No+Cover';">
            
            <h3>{{ book.title }}</h3>
            <p>By {{ book.author }}</p>
        </div>
        {% endfor %}
    </div>

</body>
</html>
