<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Lawn Collection 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section {
            background: #f8f9fa;
            padding: 60px 0;
            text-align: center;
        }
        .card-product {
            transition: transform 0.3s ease;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .card-product:hover {
            transform: scale(1.03);
        }
        .product-img {
            height: 400px;
            object-fit: cover;
        }
        .price-tag {
            color: #d63384;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">LAWN LUXE</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="#">Home</a>
            <a class="nav-link" href="#">New Arrivals</a>
            <a class="nav-link" href="#">Sale</a>
        </div>
    </div>
</nav>

<header class="hero-section mb-5">
    <div class="container">
        <h1 class="display-4 fw-bold">Summer Collection 2026</h1>
        <p class="lead">Celebrate the heat with breathable, vibrant lawn fabrics.</p>
    </div>
</header>

<div class="container">
    <div class="row g-4">
        {% for item in collection %}
        <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="card h-100 card-product">
                <img src="{{ item.image_url }}" class="card-img-top product-img" alt="{{ item.name }}">
                
                <div class="card-body">
                    <p class="text-muted small mb-1">{{ item.category }}</p>
                    <h5 class="card-title h6">{{ item.name }}</h5>
                    <p class="price-tag mb-2">{{ item.price }}</p>
                    <p class="card-text small text-secondary">{{ item.description }}</p>
                </div>
                <div class="card-footer bg-white border-0 pb-3">
                    <button class="btn btn-outline-dark w-100 btn-sm">Add to Cart</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <p>&copy; 2026 Lawn Luxe Summer Collection. All Rights Reserved.</p>
</footer>

</body>
</html>
