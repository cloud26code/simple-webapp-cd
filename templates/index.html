<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Collection 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card img {
            height: 400px;
            object-fit: cover;
        }
        .hero-section {
            background: #f8f9fa;
            padding: 60px 0;
            text-align: center;
        }
        footer {
            margin-top: 50px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">SummerVibes</a>
    </div>
</nav>

<header class="hero-section">
    <h1>Summer Collection 2026</h1>
    <p>Premium 3-Piece Suits & Trendy Frocks</p>
</header>

<div class="container my-5">
    <div class="row g-4">
        {% for product in products %}
        <div class="col-md-3">
            <div class="card h-100 product-card shadow-sm">
                <img src="{{ product.image }}" class="card-img-top" alt="{{ product.name }}">
                <div class="card-body text-center">
                    <span class="badge bg-info text-dark mb-2">{{ product.category }}</span>
                    <h5 class="card-title">{{ product.name }}</h5>
                    <p class="card-text fw-bold text-primary">{{ product.price }}</p>
                    <button class="btn btn-outline-dark w-100">Add to Cart</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<footer class="bg-dark text-white text-center py-4">
    <p>&copy; 2026 SummerVibes E-Store. All Rights Reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
